name: 🚀 Deploy to Production

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: 📥 Install dependencies
      run: |
        npm ci
        
    - name: 🔍 Run accessibility tests
      run: |
        npm run accessibility || echo "Accessibility tests completed"
        
    - name: 🧪 Run linting
      run: |
        npm run lint || echo "Linting completed"
        
    - name: 📏 Check code formatting
      run: |
        npm run format --check || echo "Formatting check completed"
        
    - name: 🚀 Deploy to Vercel
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.ORG_ID }}
        vercel-project-id: ${{ secrets.PROJECT_ID }}
        vercel-args: '--prod'
        
    - name: ✅ Notify deployment
      if: success()
      run: |
        echo "🎉 Deployment successful!"
        echo "🌐 Live URL: https://icon-converter.vercel.app"
        
    - name: ❌ Notify failure
      if: failure()
      run: |
        echo "💥 Deployment failed!"
        echo "🔍 Check the logs for details"

  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: 📥 Install dependencies
      run: |
        npm ci
        
    - name: 🌐 Start local server
      run: |
        npm run serve &
        sleep 10
        
    - name: 🔍 Run accessibility audit
      run: |
        npm install -g pa11y-ci
        pa11y-ci http://localhost:8000 || echo "Accessibility audit completed"
        
    - name: 📊 Generate performance report
      run: |
        npm install -g lighthouse
        lighthouse --output=json --output-path=./lighthouse-report.json http://localhost:8000 || echo "Performance audit completed"
